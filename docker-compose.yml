version: '3.9'

services:
  opencode:
    image: ghcr.io/anomalyco/opencode:latest
    container_name: job-agent-opencode
    platform: linux/amd64          # Force amd64 pour meilleure stabilité (surtout sur Apple Silicon)
    command: serve --port 4096
    stdin_open: true
    tty: true
    restart: unless-stopped
    volumes:
      - ./data/workspace:/workspace
      - ./data/config:/root/.config/opencode
      - ./data/user:/user-data
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENCODE_CONFIG_DIR=/root/.config/opencode
    ports:
      - "4096:4096"
    depends_on:
      - firecrawl
      - playwright
      - contextkeep
      - searxng

  firecrawl:
    image: mcp/firecrawl:latest
    container_name: job-agent-firecrawl
    restart: unless-stopped
    platform: linux/amd64          # Multi-arch existe, mais on force pour cohérence
    ports:
      - "3000:3000"
    environment:
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}

  playwright:
    image: mcp/playwright:latest
    container_name: job-agent-playwright
    platform: linux/amd64          # Très important : Playwright Chromium est plus stable en amd64
    restart: unless-stopped
    shm_size: 2gb                  # Critique pour Chromium (évite les crashes OOM)
    ipc: host                      # Recommandé pour Playwright/Chromium (meilleure perf mémoire)
    ports:
      - "3001:3001"

  searxng:
    image: searxng/searxng:latest
    container_name: job-agent-searxng
    restart: unless-stopped
    ports:
      - "8081:8080"

  contextkeep:
    image: mordang7/contextkeep:latest
    container_name: job-agent-contextkeep
    restart: unless-stopped
    volumes:
      - ./data/user/memory:/app/memory
    ports:
      - "5100:5100"

  telegram-bot:
    image: node:20-alpine
    container_name: job-agent-telegram-bot
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./data/telegram-bot:/app
      - ./data/user:/user-data
    command: sh -c "npm install && npm start"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENCODE_API_URL=http://opencode:4096
    depends_on:
      - opencode